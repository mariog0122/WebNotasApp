<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="512" height="256" rx="96" ry="96" fill="url(#shine)" opacity="0.5"/>
  <!-- Bold "W" letter -->
  <text x="256" y="395" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="380" fill="white" text-anchor="middle" filter="url(#shadow)" letter-spacing="-15">W</text>
  <!-- Small accent dot -->
  <circle cx="420" cy="130" r="28" fill="white" opacity="0.9"/>
</svg>
